<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Skills - SkillSwap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* SEARCH PAGE SPECIFIC STYLES */
        .search-hero {
            text-align: center;
            padding: 60px 0 40px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 20px;
        }
        .search-box input {
            height: 60px;
            padding: 0 60px 0 25px;
            font-size: 18px;
            box-shadow: 0 4px 20px var(--shadow);
            border-radius: 30px;
        }
        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-light);
        }
        .pill-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }
        .pill {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .pill:hover, .pill.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }
        .meet-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }
        .no-meet {
            font-size: 12px;
            color: var(--text-light);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container animate-fade">
        <div class="search-hero">
            <h1>Find Skill Providers</h1>
            <p class="small-labels" style="font-size: 16px; margin-top: 10px;">Search for specific topics you need help with.</p>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search a skill... e.g. DSA, Python, Figma" aria-label="Search skills">
            <span class="search-icon" aria-hidden="true">🔍</span>
        </div>

        <div class="pill-container" id="pill-box">
            <div class="pill" onclick="triggerPillSearch('DSA')">DSA</div>
            <div class="pill" onclick="triggerPillSearch('Web Development')">Web Dev</div>
            <div class="pill" onclick="triggerPillSearch('UI/UX Design')">UI/UX</div>
            <div class="pill" onclick="triggerPillSearch('Python')">Python</div>
            <div class="pill" onclick="triggerPillSearch('Java')">Java</div>
            <div class="pill" onclick="triggerPillSearch('Content Writing')">Content</div>
        </div>

        <div id="result-count" class="small-labels" style="margin-bottom: 20px; font-weight: 600;"></div>
        <div id="results-grid" class="grid-3">
            <div class="empty-state" style="grid-column: 1/-1;">Type something above to start searching!</div>
        </div>
    </div>

    <!-- Request Modal -->
    <div id="request-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Ask for Help</h3>
            <p id="modal-subtitle" class="small-labels" style="margin-bottom: 20px;"></p>
            <div class="form-group">
                <label>Your message...</label>
                <textarea id="request-msg" style="height: 120px;"></textarea>
            </div>
            <div id="modal-error" style="color: var(--danger); font-size: 13px; margin-bottom: 10px;"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                <button id="send-request-btn" class="btn btn-primary">Send Request</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        var currentUser = getCurrentUser();
        var selectedUserId = null;
        var selectedSkillName = null;
        var searchInput = document.getElementById('search-input');
        
        searchInput.oninput = function() {
            var query = searchInput.value;
            if (query.length >= 2) performSearch(query);
        };

        function triggerPillSearch(skill) {
            searchInput.value = skill;
            performSearch(skill);
            var pills = document.getElementsByClassName('pill');
            for (var i = 0; i < pills.length; i++) {
                pills[i].classList.remove('active');
            }
        }

        async function performSearch(query) {
            try {
                var url = "/search?skill=" + encodeURIComponent(query);
                var results = await apiFetch(url, "GET");
                var filteredResults = [];
                for (var i = 0; i < results.length; i++) {
                    if (results[i].id !== currentUser.id) {
                        filteredResults.push(results[i]);
                    }
                }
                renderSearchResults(filteredResults, query);
            } catch (err) {
                console.error("Search error:", err);
            }
        }

        function renderSearchResults(usersList, query) {
            var grid = document.getElementById('results-grid');
            var countBox = document.getElementById('result-count');
            grid.innerHTML = "";

            if (usersList.length === 0) {
                countBox.textContent = "Found 0 results for '" + query + "'";
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No students found for this skill. Try a different word?</div>';
                return;
            }

            countBox.textContent = "Found " + usersList.length + " students who know '" + query + "'";

            for (var i = 0; i < usersList.length; i++) {
                var user = usersList[i];
                var card = document.createElement("div");
                card.className = "card animate-fade";
                
                var html = '<div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">';
                html += '<div id="avatar-' + user.id + '"></div>';
                html += '<div><h4 style="margin:0">' + user.name + '</h4>';
                html += '<p class="small-labels">' + user.batch + ' • ' + user.year + '</p></div></div>';
                
                var bio = user.bio || "No bio provided.";
                html += '<p style="font-size: 14px; color: var(--text-mid); margin-bottom: 12px; height: 44px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">' + bio + '</p>';
                
                html += '<div style="margin-bottom: 15px; height: 50px; overflow: hidden;">';
                for (var j = 0; j < user.skillsIKnow.length; j++) {
                    html += '<span class="tag tag-know">' + user.skillsIKnow[j] + '</span>';
                }
                html += '</div>';
                
                html += '<div style="display: flex; flex-direction: column; gap: 10px;">';
                html += '<button class="btn btn-primary" id="req-btn-' + user.id + '" aria-label="Connect with ' + user.name + '">Connect / Ask Help</button>';
                if (user.googleMeetLink) {
                    html += '<a href="' + user.googleMeetLink + '" target="_blank" class="meet-btn">📹 Open Google Meet</a>';
                } else {
                    html += '<span class="no-meet">No meet link shared yet</span>';
                }
                html += '</div>';
                
                card.innerHTML = html;
                grid.appendChild(card);
                
                document.getElementById('avatar-' + user.id).appendChild(createAvatarCircle(user.name, "sm"));
                
                (function(uId, uName) {
                    document.getElementById('req-btn-' + uId).onclick = function() {
                        openRequestModal(uId, uName, query);
                    };
                })(user.id, user.name);
            }
        }

        function openRequestModal(userId, name, skill) {
            selectedUserId = userId;
            selectedSkillName = skill;
            var modal = document.getElementById('request-modal');
            document.getElementById('modal-title').textContent = "Ask help from " + name;
            document.getElementById('modal-subtitle').textContent = "Skill: " + skill;
            document.getElementById('request-msg').value = "";
            document.getElementById('modal-error').textContent = "";
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById('request-modal').style.display = "none";
        }

        document.getElementById('send-request-btn').onclick = async function() {
            var msg = document.getElementById('request-msg').value.trim();
            if (!msg) {
                document.getElementById('modal-error').textContent = "Write a message first!";
                return;
            }
            try {
                await apiFetch("/requests", "POST", {
                    fromUserId: currentUser.id,
                    toUserId: selectedUserId,
                    skillNeeded: selectedSkillName,
                    message: msg
                });
                var btn = document.getElementById('send-request-btn');
                btn.textContent = "Sent! ✓";
                setTimeout(function() {
                    closeModal();
                    btn.textContent = "Send Request";
                }, 1500);
            } catch (err) {
                document.getElementById('modal-error').textContent = "Error sending.";
            }
        };

        window.onclick = function(e) {
            if (e.target.id === 'request-modal') closeModal();
        };
    </script>
</body>
</html>
