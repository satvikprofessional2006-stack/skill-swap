<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - SkillSwap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CHAT PAGE SPECIFIC STYLES */
        .chat-container {
            display: flex;
            height: calc(100vh - 100px);
            margin: 20px 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .chat-sidebar {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-main);
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }
        .conv-item {
            padding: 15px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .conv-item:hover { background: var(--primary-light); }
        .conv-item.active { background: var(--primary-light); border-left: 4px solid var(--primary); }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
        }
        .messages-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: #FAF9F6;
        }
        .chat-input-area {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            background: var(--white);
        }
        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-container animate-fade">
            <!-- Sidebar -->
            <div class="chat-sidebar">
                <div class="sidebar-header">
                    <h3>Conversations</h3>
                </div>
                <div id="conversations-list-box" class="conversations-list"></div>
            </div>

            <!-- Main Area -->
            <div class="chat-main" id="chat-window">
                <div id="no-chat-placeholder" class="chat-placeholder">
                    <div style="font-size: 64px; margin-bottom: 20px;">💬</div>
                    <h2>Your Messages</h2>
                    <p>Select a person from the left to start swapping skills!</p>
                </div>

                <div id="active-chat-box" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
                    <div class="chat-header">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div id="active-header-avatar"></div>
                            <div>
                                <h4 id="active-header-name" style="margin:0">Name</h4>
                                <p id="active-header-meta" class="small-labels"></p>
                            </div>
                        </div>
                        <button class="btn btn-secondary" onclick="sendMyMeetLink()" style="font-size: 12px;">🔗 Send Meet Link</button>
                    </div>

                    <div id="messages-list-box" class="messages-area"></div>

                    <div class="chat-input-area">
                        <input type="text" id="msg-input-field" placeholder="Type a message..." style="margin-top: 0;">
                        <button id="msg-send-btn" class="btn btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        var currentUser = getCurrentUser();
        var currentChatPartnerId = null;
        var chatPollingInterval = null;

        document.addEventListener("DOMContentLoaded", function() {
            if (!currentUser) return;
            var urlParams = new URLSearchParams(window.location.search);
            var partnerIdFromUrl = urlParams.get('with');
            loadConversationList(partnerIdFromUrl);
        });

        async function loadConversationList(autoSelectId) {
            try {
                var allUsers = await apiFetch("/users", "GET");
                var receivedReqs = await apiFetch("/requests/" + currentUser.id, "GET");
                var sentReqs = await apiFetch("/requests/sent/" + currentUser.id, "GET");

                var partnersIds = [];
                for (var i = 0; i < receivedReqs.length; i++) {
                    var id = receivedReqs[i].fromUserId;
                    if (partnersIds.indexOf(id) === -1) partnersIds.push(id);
                }
                for (var j = 0; j < sentReqs.length; j++) {
                    var id = sentReqs[j].toUserId;
                    if (partnersIds.indexOf(id) === -1) partnersIds.push(id);
                }
                if (autoSelectId && partnersIds.indexOf(autoSelectId) === -1) {
                    partnersIds.unshift(autoSelectId);
                }

                var partnersList = [];
                for (var k = 0; k < partnersIds.length; k++) {
                    var pId = partnersIds[k];
                    for (var l = 0; l < allUsers.length; l++) {
                        if (allUsers[l].id === pId) {
                            partnersList.push(allUsers[l]);
                            break;
                        }
                    }
                }

                renderSidebar(partnersList, autoSelectId);
                if (autoSelectId) selectConversation(autoSelectId);
            } catch (err) {
                console.error("Chat list error:", err);
            }
        }

        function renderSidebar(partners, activeId) {
            var list = document.getElementById('conversations-list-box');
            list.innerHTML = "";
            if (partners.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center;" class="small-labels">No chats yet!</div>';
                return;
            }
            for (var i = 0; i < partners.length; i++) {
                var user = partners[i];
                var item = document.createElement("div");
                item.className = "conv-item";
                if (user.id === activeId) item.className += " active";
                (function(uId) {
                    item.onclick = function() { selectConversation(uId); };
                })(user.id);
                var html = '<div id="sidebar-avatar-' + user.id + '"></div>';
                html += '<div style="flex: 1; overflow: hidden;"><h4 style="margin:0; font-size: 15px;">' + user.name + '</h4>';
                html += '<p class="small-labels">' + user.batch + ' • ' + user.year + '</p></div>';
                item.innerHTML = html;
                list.appendChild(item);
                document.getElementById('sidebar-avatar-' + user.id).appendChild(createAvatarCircle(user.name, "sm"));
            }
        }

        async function selectConversation(partnerId) {
            currentChatPartnerId = partnerId;
            document.getElementById('no-chat-placeholder').classList.add('hidden');
            document.getElementById('active-chat-box').classList.remove('hidden');
            var items = document.getElementsByClassName('conv-item');
            for (var i = 0; i < items.length; i++) items[i].classList.remove('active');

            // Reset message area when switching chats
            var msgArea = document.getElementById('messages-list-box');
            msgArea.innerHTML = "";
            msgArea.setAttribute('data-last-count', '0');

            try {
                var partner = await apiFetch("/users/" + partnerId, "GET");
                document.getElementById('active-header-name').textContent = partner.name;
                document.getElementById('active-header-meta').textContent = partner.batch + " • " + partner.year;
                var headerAvatar = document.getElementById('active-header-avatar');
                headerAvatar.innerHTML = "";
                headerAvatar.appendChild(createAvatarCircle(partner.name, "sm"));

                fetchMessages();
                if (chatPollingInterval) clearInterval(chatPollingInterval);
                chatPollingInterval = setInterval(fetchMessages, 3000);
            } catch (err) {
                console.error("Select chat error:", err);
            }
        }

        async function fetchMessages() {
            if (!currentChatPartnerId) return;
            try {
                var messages = await apiFetch("/messages/" + currentUser.id + "/" + currentChatPartnerId, "GET");
                var msgArea = document.getElementById('messages-list-box');
                
                var lastCount = parseInt(msgArea.getAttribute('data-last-count') || "0");
                
                // If no new messages, don't do anything
                if (lastCount === messages.length) return; 

                // If we have new messages, append only the NEW ones
                for (var i = lastCount; i < messages.length; i++) {
                    var m = messages[i];
                    var bubble = document.createElement("div");
                    var isMe = (m.fromUserId === currentUser.id);
                    bubble.className = isMe ? "message message-sent" : "message message-received";
                    var timeStr = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    bubble.innerHTML = m.text + '<span class="message-time">' + timeStr + '</span>';
                    msgArea.appendChild(bubble);
                }
                
                msgArea.setAttribute('data-last-count', messages.length);
                msgArea.scrollTop = msgArea.scrollHeight;
            } catch (err) {
                console.error("Fetch messages failed:", err);
            }
        }

        async function sendMessageToServer() {
            var input = document.getElementById('msg-input-field');
            var text = input.value.trim();
            if (!text || !currentChatPartnerId) return;
            try {
                await apiFetch("/messages", "POST", { fromUserId: currentUser.id, toUserId: currentChatPartnerId, text: text });
                input.value = "";
                fetchMessages();
            } catch (err) {
                console.error("Send failed:", err);
            }
        }

        function sendMyMeetLink() {
            if (!currentUser.googleMeetLink) {
                alert("Please add your Google Meet link in My Profile first!");
                return;
            }
            var linkMsg = "Hey! Let's connect here: " + currentUser.googleMeetLink;
            apiFetch("/messages", "POST", { fromUserId: currentUser.id, toUserId: currentChatPartnerId, text: linkMsg }).then(function() {
                fetchMessages();
            });
        }

        document.getElementById('msg-send-btn').onclick = sendMessageToServer;
        document.getElementById('msg-input-field').onkeydown = function(event) {
            if (event.keyCode === 13) sendMessageToServer();
        };
        window.onbeforeunload = function() {
            if (chatPollingInterval) clearInterval(chatPollingInterval);
        };
    </script>
</body>
</html>
